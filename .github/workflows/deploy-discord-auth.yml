name: Deploy Discord Auth Worker

on:
  push:
    branches: [main]
    paths:
      - "NULLSCAPE/**"
      - "services/discord-auth/**"
      - ".github/workflows/deploy-discord-auth.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: discord-auth-worker-production
  cancel-in-progress: true

jobs:
  preflight:
    name: Check deployment configuration
    runs-on: ubuntu-latest
    outputs:
      deploy_ready: ${{ steps.cloudflare-token.outputs.deploy_ready }}
    steps:
      - id: cloudflare-token
        name: Check Cloudflare token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "deploy_ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Cloudflare deployment waiting::Add CLOUDFLARE_API_TOKEN to this repository's Actions secrets, then rerun this workflow or push a new commit."
          else
            echo "deploy_ready=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: preflight
    if: needs.preflight.outputs.deploy_ready == 'true'
    name: Build and deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/discord-auth
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/discord-auth/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify protected bundle
        run: npm run check
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Apply D1 migrations
        run: npm run db:remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Worker
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
